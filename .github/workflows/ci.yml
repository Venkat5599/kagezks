name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  contract-tests:
    name: Contract Tests (Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup update stable && rustup target add wasm32-unknown-unknown
      - name: Run veil pool tests
        working-directory: contracts/solvency
        run: cargo test -p veil
      - name: Run session account tests
        working-directory: contracts/solvency
        run: cargo test -p session_account
      - name: Clippy lint (veil)
        working-directory: contracts/solvency
        run: cargo clippy -p veil -- -D warnings
      - name: Clippy lint (session_account)
        working-directory: contracts/solvency
        run: cargo clippy -p session_account -- -D warnings
      - name: Rust format check
        working-directory: contracts/solvency
        run: cargo fmt --check
      - name: Verify WASM build (veil)
        working-directory: contracts/solvency
        run: cargo build -p veil --target wasm32-unknown-unknown --release
      - name: Verify WASM build (session_account)
        working-directory: contracts/solvency
        run: cargo build -p session_account --target wasm32-unknown-unknown --release

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: TypeCheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npx eslint . --quiet
      - name: Format Check
        working-directory: frontend
        run: npx prettier --check "app/**/*.{ts,tsx}" "components/**/*.{ts,tsx}" "lib/**/*.ts"
      - name: Test
        working-directory: frontend
        run: npx vitest run
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high
